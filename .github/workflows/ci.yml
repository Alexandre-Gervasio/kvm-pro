name: CI Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build all binaries
        run: cargo build --release --all-targets
      
      - name: Run tests
        run: cargo test --release --no-fail-fast

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Check formatting
        run: cargo fmt -- --check

  clippy:
    name: Clippy Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  build-linux:
    name: Build Linux (musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      
      - name: Install musl-tools and dependencies
        run: sudo apt-get update && sudo apt-get install -y musl-tools libssl-dev pkg-config
      
      - name: Build kvm-pro-server
        run: cargo build --release --target x86_64-unknown-linux-musl --bin kvm-pro-server
      
      - name: Build kvm-pro-client
        run: cargo build --release --target x86_64-unknown-linux-musl --bin kvm-pro-client

  build-windows:
    name: Build Windows (cross)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      
      - name: Install MinGW and dependencies
        run: sudo apt-get update && sudo apt-get install -y mingw-w64 pkg-config
      
      - name: Build kvm-pro-server
        run: cargo build --release --target x86_64-pc-windows-gnu --bin kvm-pro-server
      
      - name: Build kvm-pro-client
        run: cargo build --release --target x86_64-pc-windows-gnu --bin kvm-pro-client
